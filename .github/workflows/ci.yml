# .github/workflows/ci.yml
name: ci

on:
  push:
  pull_request:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onehaven_decision_engine
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: |
          cp -n .env.example .env || true

      - name: Build and start stack
        run: |
          docker compose up -d --build
          sleep 10

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Migration sanity
        run: |
          docker compose exec -T backend python -m app.bootstrap >/dev/null 2>&1 || true
          docker compose exec -T backend alembic upgrade head

      - name: Regression suites
        run: |
          bash scripts/run_regression_suite.sh

      - name: Smoke test
        run: |
          bash scripts/smoke_test.sh

      - name: Premium PoC checks
        run: |
          bash scripts/run_premium_poc_checks.sh

      - name: Backend pytest full
        working-directory: onehaven_decision_engine/backend
        run: |
          docker compose exec -T backend pytest -q

      - name: Dump backend logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/onehaven-artifacts
          docker compose logs backend > /tmp/onehaven-artifacts/backend.log || true
          docker compose logs worker > /tmp/onehaven-artifacts/worker.log || true
          docker compose logs beat > /tmp/onehaven-artifacts/beat.log || true
          tail -n 200 /tmp/onehaven-artifacts/backend.log || true
          tail -n 200 /tmp/onehaven-artifacts/worker.log || true
          tail -n 200 /tmp/onehaven-artifacts/beat.log || true

      - name: Shutdown
        if: always()
        run: |
          docker compose down -v