services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: decision_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d decision_engine"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./docs:/app/docs
    environment:
      ALEMBIC_CONFIG: /app/app/alembic.ini
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: ${APP_ENV:-dev}

      # External APIs
      HUD_USER_TOKEN: ${HUD_USER_TOKEN}
      RENTCAST_API_KEY: ${RENTCAST_API_KEY}
      GOVINFO_API_KEY: ${GOVINFO_API_KEY}
      GOVINFO_BASE_URL: ${GOVINFO_BASE_URL:-https://api.govinfo.gov}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}

      # PDF dataset roots
      POLICY_PDFS_ROOT: /app/data/pdfs
      POLICY_PDF_ROOT: /app/data/pdfs
      NSPIRE_PDF_ROOT: /app/data/pdfs

      # Auth / dev provisioning
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTO_PROVISION: ${DEV_AUTO_PROVISION:-1}
      DEV_AUTO_VERIFY_EMAIL: ${DEV_AUTO_VERIFY_EMAIL:-1}

      # API keys
      ENABLE_API_KEYS: ${ENABLE_API_KEYS:-0}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev-pepper-change-me}
      API_KEY_PREFIX_LEN: ${API_KEY_PREFIX_LEN:-10}
      DEFAULT_PLAN_CODE: ${DEFAULT_PLAN_CODE:-free}

      # JWT cookie
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      JWT_EXP_MINUTES: ${JWT_EXP_MINUTES:-10080}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-onehaven_jwt}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-0}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:-lax}

      # Celery
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_QUEUE: ${CELERY_QUEUE:-celery}

      # Jurisdiction / policy automation
      JURISDICTION_CRITICAL_STALE_LOCKOUT_ENABLED: ${JURISDICTION_CRITICAL_STALE_LOCKOUT_ENABLED:-1}
      JURISDICTION_NOTIFICATION_ENABLED: ${JURISDICTION_NOTIFICATION_ENABLED:-1}
      JURISDICTION_AUTOMATION_ENABLED: ${JURISDICTION_AUTOMATION_ENABLED:-0}
      JURISDICTION_DISCOVERY_RETRY_SCHEDULE_MINUTES: ${JURISDICTION_DISCOVERY_RETRY_SCHEDULE_MINUTES:-1440}
      JURISDICTION_HEALTH_SCHEDULE_MINUTES: ${JURISDICTION_HEALTH_SCHEDULE_MINUTES:-360}
      JURISDICTION_RECOMPUTE_SCHEDULE_MINUTES: ${JURISDICTION_RECOMPUTE_SCHEDULE_MINUTES:-720}
      JURISDICTION_REFRESH_SCHEDULE_MINUTES: ${JURISDICTION_REFRESH_SCHEDULE_MINUTES:-720}
      JURISDICTION_VALIDATION_RETRY_SCHEDULE_MINUTES: ${JURISDICTION_VALIDATION_RETRY_SCHEDULE_MINUTES:-360}

      JURISDICTION_SLA_AUTHORITATIVE_HOURS: ${JURISDICTION_SLA_AUTHORITATIVE_HOURS:-504}
      JURISDICTION_SLA_CRITICAL_AUTHORITATIVE_HOURS: ${JURISDICTION_SLA_CRITICAL_AUTHORITATIVE_HOURS:-336}
      JURISDICTION_SLA_DEFAULT_HOURS: ${JURISDICTION_SLA_DEFAULT_HOURS:-720}
      JURISDICTION_SLA_DISCOVERY_RETRY_HOURS: ${JURISDICTION_SLA_DISCOVERY_RETRY_HOURS:-24}
      JURISDICTION_SLA_PROGRAM_OVERLAY_HOURS: ${JURISDICTION_SLA_PROGRAM_OVERLAY_HOURS:-336}
      JURISDICTION_SLA_VALIDATION_RETRY_HOURS: ${JURISDICTION_SLA_VALIDATION_RETRY_HOURS:-12}

      # Market sync
      MARKET_CATALOG_BACKEND: ${MARKET_CATALOG_BACKEND:-static}
      MARKET_SYNC_DAILY_MARKET_LIMIT: ${MARKET_SYNC_DAILY_MARKET_LIMIT:-6}
      MARKET_SYNC_DAILY_TIER_FILTER: ${MARKET_SYNC_DAILY_TIER_FILTER:-all}
      MARKET_SYNC_DEFAULT_LIMIT_PER_MARKET: ${MARKET_SYNC_DEFAULT_LIMIT_PER_MARKET:-250}
      MARKET_SYNC_ENABLE_STATEWIDE_EXPANSION: ${MARKET_SYNC_ENABLE_STATEWIDE_EXPANSION:-0}

      # Agents
      AGENTS_MAX_RUNS_PER_PROPERTY_PER_HOUR: ${AGENTS_MAX_RUNS_PER_PROPERTY_PER_HOUR:-3}
      AGENTS_MAX_RETRIES: ${AGENTS_MAX_RETRIES:-3}
      AGENTS_RUN_TIMEOUT_SECONDS: ${AGENTS_RUN_TIMEOUT_SECONDS:-120}
      TRACE_MIRROR_TO_MESSAGES: ${TRACE_MIRROR_TO_MESSAGES:-0}

    command: bash -lc "alembic -c /app/app/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  agent-worker:
    build: ./backend
    working_dir: /app
    user: "1000:1000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: ${APP_ENV:-dev}

      # PDF dataset roots
      POLICY_PDFS_ROOT: /app/data/pdfs
      POLICY_PDF_ROOT: /app/data/pdfs
      NSPIRE_PDF_ROOT: /app/data/pdfs

      # Auth consistency
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTO_PROVISION: ${DEV_AUTO_PROVISION:-1}
      DEV_AUTO_VERIFY_EMAIL: ${DEV_AUTO_VERIFY_EMAIL:-1}

      ENABLE_API_KEYS: ${ENABLE_API_KEYS:-0}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev-pepper-change-me}
      API_KEY_PREFIX_LEN: ${API_KEY_PREFIX_LEN:-10}
      DEFAULT_PLAN_CODE: ${DEFAULT_PLAN_CODE:-free}

      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_QUEUE: ${CELERY_QUEUE:-celery}

      JURISDICTION_CRITICAL_STALE_LOCKOUT_ENABLED: ${JURISDICTION_CRITICAL_STALE_LOCKOUT_ENABLED:-1}
      JURISDICTION_NOTIFICATION_ENABLED: ${JURISDICTION_NOTIFICATION_ENABLED:-1}
      JURISDICTION_AUTOMATION_ENABLED: ${JURISDICTION_AUTOMATION_ENABLED:-0}

      AGENTS_MAX_RETRIES: ${AGENTS_MAX_RETRIES:-3}
      AGENTS_RUN_TIMEOUT_SECONDS: ${AGENTS_RUN_TIMEOUT_SECONDS:-120}
      TRACE_MIRROR_TO_MESSAGES: ${TRACE_MIRROR_TO_MESSAGES:-0}

    command: bash -lc "celery -A app.workers.celery_app:celery_app worker -l INFO -Q ${CELERY_QUEUE:-celery}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production
    restart: unless-stopped

volumes:
  pgdata: